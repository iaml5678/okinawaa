<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大象班🐘 沖繩大冒險</title>
    
    <!-- 引入 Tailwind CSS & 日系圓體字 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- 引入工具：Vue 3, Lucide Icons, SortableJS, Framer Motion (微動效) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --okinawa-blue: #4EB7D0;
            --hibiscus-pink: #FF8FA3;
            --sun-yellow: #FFD154;
            --paper-white: #FDFBF7;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--paper-white);
            color: #5D4037;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏捲動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 超軟陰影設計 */
        .soft-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(93, 64, 55, 0.05);
            border: 1px solid rgba(93, 64, 55, 0.02);
        }

        /* 浮動按鈕玻璃質感 */
        .glass-tab {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 頁首圖片過渡動畫 */
        .header-curve {
            border-radius: 0 0 50% 50% / 0 0 15% 15%;
        }

        /* 點擊縮放效果 */
        .btn-bounce:active { transform: scale(0.92); }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <!-- 頁首 Banner 區區塊 -->
    <header class="relative w-full h-[280px] overflow-hidden shadow-2xl">
        <!-- 班長！請確認你的圖片檔名是否為 banner.jpg -->
        <img src="banner.jpg" alt="大象班沖繩出遊" class="w-full h-full object-cover">
        
        <!-- 浮動在圖片右下方的 Tab 選單 -->
        <div class="absolute bottom-12 right-4 flex gap-2 z-20">
            <button v-for="tab in tabs" :key="tab.id" 
                    @click="activeTab = tab.id"
                    class="btn-bounce w-12 h-12 rounded-2xl flex items-center justify-center glass-tab transition-all shadow-lg"
                    :class="activeTab === tab.id ? 'bg-white text-[#4EB7D0] scale-110' : 'text-gray-500 opacity-80'">
                <i :data-lucide="tab.icon" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- 主內容容器：向上拉動與圖片重疊，創造圓潤感 -->
    <main class="relative -mt-10 bg-inherit rounded-t-[45px] px-5 pb-32 z-10">
        
        <!-- 分頁 1: 每日行程 -->
        <section v-if="activeTab === 'schedule'" class="pt-8">
            <!-- 天氣 Widget -->
            <div class="flex items-center justify-between px-2 mb-8">
                <div class="flex items-center gap-4">
                    <span class="text-5xl animate-pulse">☀️</span>
                    <div>
                        <div class="text-2xl font-black text-[#5D4037]">那霸 26°C</div>
                        <div class="text-sm font-bold text-gray-400">Feels like 28°C · 超嗨大象日</div>
                    </div>
                </div>
            </div>

            <!-- 日期選擇器：橫向滾動貼紙風 -->
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-8 px-2">
                <button v-for="(day, idx) in days" :key="idx"
                        @click="activeDateIndex = idx"
                        class="btn-bounce flex flex-col items-center min-w-[72px] p-4 rounded-3xl transition-all"
                        :class="activeDateIndex === idx ? 'bg-[#FFD154] text-[#5D4037] shadow-xl scale-110' : 'bg-white text-gray-300 shadow-sm'">
                    <span class="text-xs font-bold uppercase tracking-widest">{{ day.week }}</span>
                    <span class="text-2xl font-black mt-1">{{ day.date }}</span>
                </button>
            </div>

            <!-- 行程清單區 -->
            <div id="schedule-list" class="space-y-6">
                <div v-for="(item, index) in currentDayItems" :key="item.id" class="group">
                    <!-- 交通標記：在行程之間顯示車子圖案 -->
                    <div v-if="index > 0" class="flex flex-col items-center w-12 my-2 opacity-20">
                        <div class="w-0.5 h-6 bg-[#5D4037] border-dashed border-l"></div>
                        <i data-lucide="car" class="w-4 h-4 my-1"></i>
                        <div class="w-0.5 h-6 bg-[#5D4037] border-dashed border-l"></div>
                    </div>

                    <!-- 行程卡片 -->
                    <div class="soft-card p-6 btn-bounce border-2 border-transparent active:border-[#4EB7D0]/20 transition-all"
                         @click="openMap(item.address)">
                        
                        <!-- 航班類別特殊排版 -->
                        <div v-if="item.category === '航班'" class="mb-4 p-4 bg-[#E0F2FE]/50 rounded-2xl flex justify-around items-center border border-blue-100">
                            <div class="text-center"><div class="text-2xl font-black">TPE</div><div class="text-[10px] opacity-50">12:00</div></div>
                            <div class="flex-1 px-4"><div class="border-b-2 border-dashed border-blue-200 relative"><i data-lucide="plane" class="w-4 h-4 absolute -top-2 left-1/2 -translate-x-1/2 text-blue-400"></i></div></div>
                            <div class="text-center"><div class="text-2xl font-black">OKA</div><div class="text-[10px] opacity-50">14:30</div></div>
                        </div>

                        <div class="flex items-center gap-5">
                            <!-- 分類圖示 -->
                            <div :class="['w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner', getCatColor(item.category)]">
                                <i :data-lucide="getCatIcon(item.category)" class="w-7 h-7"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="bg-gray-100 text-[10px] px-2 py-0.5 rounded-full font-bold text-gray-400">{{ item.category }}</span>
                                    <span class="text-[11px] font-bold text-[#4EB7D0] tracking-tighter">{{ item.time }}</span>
