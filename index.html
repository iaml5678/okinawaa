<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大象班🐘 沖繩冒險</title>
    
    <!-- 引入美化工具 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- 核心大腦：Vue 3 與 圖標庫 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 隱身咒：在網頁還沒準備好前先藏起來，避免動不了的尷尬 */
        [v-cloak] { display: none; }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #FDFBF7;
            color: #5D4037;
            -webkit-tap-highlight-color: transparent;
        }

        .soft-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(93, 64, 55, 0.05);
            transition: transform 0.2s;
        }

        .soft-card:active { transform: scale(0.95); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <!-- 1. 頁首封面 (使用你給的那張美圖) -->
    <header class="relative w-full h-[260px] shadow-lg">
        <img src="banner.jpg" alt="Banner" class="w-full h-full object-cover">
        
        <!-- 分頁標籤按鈕 (浮動在右下) -->
        <div class="absolute bottom-6 right-4 flex gap-2">
            <button v-for="tab in tabs" :key="tab.id" @click="activeTab = tab.id"
                class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-xl transition-all"
                :class="activeTab === tab.id ? 'bg-[#FFD154] text-white scale-110' : 'bg-white/90 text-gray-400'">
                <i :data-lucide="tab.icon" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- 2. 主內容 (向上拉動銜接) -->
    <main class="relative -mt-8 bg-[#FDFBF7] rounded-t-[40px] px-5 pb-32 pt-8 min-h-screen">
        
        <!-- 行程頁面 -->
        <div v-if="activeTab === 'schedule'">
            <!-- 天氣 Widget -->
            <div class="flex items-center gap-4 mb-8 bg-white p-4 rounded-[25px] shadow-sm">
                <span class="text-5xl">☀️</span>
                <div>
                    <h2 class="text-2xl font-black italic">Okinawa 26°C</h2>
                    <p class="text-xs font-bold text-gray-300 uppercase tracking-widest">Elephant Class Adventure</p>
                </div>
            </div>

            <!-- 日期捲軸 -->
            <div class="flex gap-4 overflow-x-auto no-scrollbar mb-8">
                <button v-for="(day, idx) in days" :key="idx" @click="activeDateIndex = idx"
                    class="flex flex-col items-center min-w-[70px] p-4 rounded-[28px] transition-all"
                    :class="activeDateIndex === idx ? 'bg-[#FFD154] shadow-lg scale-105' : 'bg-white text-gray-300 shadow-sm'">
                    <span class="text-[10px] font-black">{{ day.week }}</span>
                    <span class="text-2xl font-black">{{ day.date }}</span>
                </button>
            </div>

            <!-- 行程清單 -->
            <div class="space-y-4">
                <div v-for="(item, i) in currentDayItems" :key="i" @click="openMap(item.address)"
                    class="soft-card p-5 border border-white flex items-center gap-4">
                    
                    <div :class="['w-12 h-12 rounded-2xl flex items-center justify-center', getCatColor(item.category)]">
                        <i :data-lucide="getCatIcon(item.category)" class="w-6 h-6"></i>
                    </div>
                    
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black text-gray-300 uppercase">{{ item.time }}</span>
                            <span class="bg-gray-100 text-[9px] px-2 py-0.5 rounded-full font-bold text-gray-400">{{ item.category }}</span>
                        </div>
                        <h3 class="text-lg font-black leading-tight">{{ item.name }}</h3>
                    </div>
                    <i data-lucide="chevron-right" class="text-gray-200"></i>
                </div>
            </div>
        </div>

        <!-- 資訊頁 (匯率) -->
        <div v-if="activeTab === 'info'" class="pt-4 animate-fade-in">
            <div class="soft-card p-8 bg-white border-b-8 border-yellow-100">
                <h3 class="font-black text-xl mb-6">🐘 大象班專屬匯率</h3>
                <div class="space-y-4">
                    <input type="number" v-model="jpyInput" class="w-full p-5 bg-gray-50 rounded-3xl text-2xl font-black focus:outline-none" placeholder="輸入日幣 JPY">
                    <div class="text-center text-pink-300"><i data-lucide="arrow-down"></i></div>
                    <div class="p-6 bg-[#FDFBF7] rounded-3xl text-center">
                        <span class="text-4xl font-black text-pink-400">NT$ {{ (jpyInput * 0.21).toFixed(0) }}</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 底部導航 -->
    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-nav rounded-[35px] shadow-2xl flex items-center justify-around px-4 z-50">
        <button v-for="tab in tabs" :key="tab.id" @click="activeTab = tab.id"
            class="flex flex-col items-center gap-1 transition-all"
            :class="activeTab === tab.id ? 'text-[#4EB7D0] scale-110' : 'text-gray-300'">
            <i :data-lucide="tab.icon" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase">{{ tab.label }}</span>
        </button>
    </nav>
</div>

<script>
    // 這裡就是網頁的核心引擎
    const { createApp, ref, computed, onMounted, nextTick, watch } = Vue;

    const app = createApp({
        setup() {
            const activeTab = ref('schedule');
            const activeDateIndex = ref(0);
            const jpyInput = ref(0);

            const tabs = [
                { id: 'schedule', label: '冒險', icon: 'map-pin' },
                { id: 'info', label: '資訊', icon: 'info' },
                { id: 'expense', label: '記帳', icon: 'wallet' }
            ];

            const days = [
                { week: 'Thu', date: '9' }, { week: 'Fri', date: '10' },
                { week: 'Sat', date: '11' }, { week: 'Sun', date: '12' }, { week: 'Mon', date: '13' }
            ];

            const scheduleItems = [
                { day: 0, time: "12:00", category: "航班", name: "星宇航空 JX870", address: "那霸機場" },
                { day: 0, time: "18:00", category: "住宿", name: "恩納村海邊別墅", address: "1854 Afuso, Onna" },
                { day: 1, time: "08:30", category: "景點", name: "美麗海水族館", address: "美麗海水族館" },
                { day: 2, time: "10:00", category: "景點", name: "沖繩兒童王國 🐘", address: "沖繩兒童王國" }
            ];

            const currentDayItems = computed(() => {
                return scheduleItems.filter(item => item.day === activeDateIndex.value);
            });

            const openMap = (address) => {
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}`, '_blank');
            };

            const getCatIcon = (cat) => {
                const icons = { '航班': 'plane', '住宿': 'home', '景點': 'camera', '美食': 'utensils' };
                return icons[cat] || 'star';
            };

            const getCatColor = (cat) => {
                const colors = { '航班': 'bg-blue-50 text-blue-400', '住宿': 'bg-indigo-50 text-indigo-400', '景點': 'bg-green-50 text-green-400', '美食': 'bg-orange-50 text-orange-400' };
                return colors[cat] || 'bg-gray-50';
            };

            // 啟動圖標庫
            const refreshIcons = () => {
                nextTick(() => { if (window.lucide) lucide.createIcons(); });
            };

            onMounted(() => { refreshIcons(); });
            watch([activeTab, activeDateIndex], () => { refreshIcons(); });

            return {
                activeTab, activeDateIndex, tabs, days, currentDayItems,
                jpyInput, openMap, getCatIcon, getCatColor
            };
        }
    });

    // 正式啟動！
    app.mount('#app');
</script>

</body>
</html>
