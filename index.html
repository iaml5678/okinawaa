<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大象班🐘 沖繩奶茶手帳</title>
    
    <!-- 引入美化工具 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        [v-cloak] { display: none; }
        :root {
            --text-brown: #7D6E66;
            --bg-cream: #F9F6F2;
            --card-white: #FFFFFF;
            --milk-tea: #E5D3B3;
        }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-brown);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 圖片漸層透明效果 */
        .banner-gradient-mask {
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .journal-card {
            background: var(--card-white);
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(125, 110, 102, 0.04);
            border: 1px solid rgba(125, 110, 102, 0.03);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .person-tag {
            @apply px-4 py-2 rounded-xl text-lg transition-all border-2;
        }

        .tag-active {
            background-color: white;
            border-color: #E5D3B3;
            box-shadow: 0 4px 10px rgba(229, 211, 179, 0.3);
        }

        .tag-inactive {
            background-color: #F9F6F2;
            color: #D1C7C2;
            border-color: transparent;
            opacity: 0.5;
        }

        input::placeholder { color: #D1C7C2; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <!-- 1. 頁首 Banner (純淨無標題版) -->
    <header class="relative w-full h-[280px] overflow-hidden bg-[#F9F6F2]">
        <img :src="currentBanner" class="w-full h-full object-cover banner-gradient-mask" @error="tryNextImage">
    </header>

    <!-- 2. 主內容區域 -->
    <main class="relative -mt-20 px-6 pb-44 z-10 space-y-7">
        
        <!-- --- 分頁 A: 首頁 (Home) --- -->
        <div v-if="activeTab === 'home'" class="space-y-7 animate-fade-in pt-4">
            
            <!-- 匯率試算卡片 (同步顯示千分位) -->
            <div class="journal-card p-8 relative overflow-hidden">
                <div class="flex items-center gap-3 mb-6 opacity-40">
                    <i data-lucide="calculator" class="w-4 h-4 text-brown"></i>
                    <span class="text-xs font-black tracking-widest uppercase">匯率試算</span>
                </div>

                <div class="flex justify-between items-start mb-8 relative z-10">
                    <!-- 左側：日幣輸入 -->
                    <div class="w-[45%]">
                        <div class="text-[9px] font-black text-gray-300 mb-2 uppercase tracking-widest">JPY 日幣</div>
                        <!-- 大大的千分位顯示 -->
                        <div class="text-4xl font-light text-[#7D6E66] leading-tight mb-1 truncate">
                            {{ formatNumber(jpyInput || 0) }}
                        </div>
                        <input type="number" v-model="jpyInput" class="w-full text-xs font-bold text-gray-200 focus:outline-none bg-transparent border-b border-gray-100 pb-1" placeholder="輸入日幣">
                    </div>
                    
                    <div class="text-2xl font-light text-gray-200 mt-6 px-1">=</div>
                    
                    <!-- 右側：台幣結果 -->
                    <div class="w-[45%] text-right">
                        <div class="text-[9px] font-black text-gray-300 mb-2 uppercase tracking-widest">TWD 台幣</div>
                        <div class="text-4xl font-light text-[#7D6E66] leading-tight mb-1 truncate">
                            {{ formatNumber(Math.round(jpyInput * 0.202)) }}
                        </div>
                        <div class="text-[10px] font-bold text-gray-200 mt-3 tracking-widest italic">Rate: 0.202</div>
                    </div>
                </div>

                <div class="flex justify-end items-center">
                    <!-- 免稅貼紙 -->
                    <div v-if="jpyInput >= 5000" class="flex items-center gap-1 bg-[#D4E6D9] text-[#5A7D63] px-4 py-2 rounded-full text-[10px] font-bold shadow-sm animate-pulse">
                        ✨ 已達免稅
                    </div>
                    <div v-else class="text-[10px] text-gray-200 font-bold tracking-widest italic">Tax Free (¥5,000)</div>
                </div>
                <div class="absolute -top-6 -right-6 w-20 h-20 bg-[#F9F6F2] rounded-full opacity-40"></div>
            </div>

            <!-- 沖繩一週天氣 -->
            <div class="journal-card p-8">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-xs font-bold opacity-30">沖繩一週天氣</span>
                    <span class="text-[9px] font-black opacity-20 tracking-widest uppercase">Naha, Okinawa</span>
                </div>
                <div class="flex justify-between items-center px-1">
                    <div v-for="w in weather" :key="w.date" class="flex flex-col items-center gap-4">
                        <span class="text-[9px] font-black text-gray-300 tracking-tighter">{{ w.date }}</span>
                        <div class="text-2xl transform active:scale-125 transition-transform">{{ w.icon }}</div>
                        <span class="text-sm font-bold text-[#7D6E66] opacity-70">{{ w.temp }}°</span>
                    </div>
                </div>
            </div>

            <!-- Visit Japan Web (點擊上傳截圖 / 多人切換) -->
            <div class="journal-card p-8 border-l-4 border-[#7D6E66]/10">
                <div class="flex items-center gap-3 mb-8">
                    <i data-lucide="qr-code" class="w-4 h-4 opacity-30 text-[#7D6E66]"></i>
                    <span class="text-xs font-black opacity-30 tracking-widest uppercase text-gray-400">Visit Japan Web</span>
                </div>
                
                <!-- Emoji 切換標籤：👨🏻、👩🏻、👶🏻、👶🏼 -->
                <div class="flex gap-4 mb-8 justify-center pb-2">
                    <button v-for="(person, pidx) in vjwMembers" :key="pidx"
                        @click="activeVjwIdx = pidx"
                        class="person-tag"
                        :class="activeVjwIdx === pidx ? 'tag-active' : 'tag-inactive'">
                        {{ person.icon }}
                    </button>
                </div>

                <!-- QR 上傳區域 -->
                <div class="relative bg-[#FDFBF7] rounded-[35px] p-8 flex flex-col items-center justify-center border-2 border-dashed border-[#E5D3B3]/50 min-h-[250px] overflow-hidden"
                     @click="triggerUpload">
                    
                    <input type="file" ref="fileInput" class="hidden" accept="image/*" @change="handleFileUpload">
                    
                    <img v-if="vjwMembers[activeVjwIdx].qrUrl" :src="vjwMembers[activeVjwIdx].qrUrl" class="absolute inset-0 w-full h-full object-contain">
                    
                    <div v-else class="flex flex-col items-center text-center">
                        <div class="text-4xl text-[#E5D3B3] mb-4">+</div>
                        <div class="text-[12px] font-black text-[#7D6E66] opacity-60 italic">點擊上傳截圖</div>
                        <div class="text-[9px] text-[#D1C7C2] mt-1 tracking-widest uppercase">(存於本機)</div>
                    </div>
                </div>

                <!-- 官網按鈕 -->
                <button @click="openVjwOfficial" class="w-full mt-6 py-4 bg-[#F5EBEB] text-[#7D6E66] rounded-2xl text-[12px] font-black tracking-[0.3em] active:scale-95 transition-all shadow-sm">
                    開啟 VJW 官網
                </button>
            </div>
        </div>

        <!-- --- 分頁 B: 行程 (Day 1, Day 2...) --- -->
        <div v-if="activeTab === 'schedule'" class="pt-4 space-y-7 animate-fade-in">
            <!-- 天數切換 -->
            <div class="flex gap-4 overflow-x-auto no-scrollbar py-2 px-1">
                <button v-for="(day, idx) in days" :key="idx" @click="activeDateIndex = idx"
                    class="flex flex-col items-center min-w-[85px] p-5 rounded-[35px] transition-all shadow-sm active:scale-95"
                    :class="activeDateIndex === idx ? 'bg-[#7D6E66] text-white shadow-xl' : 'bg-white text-gray-300'">
                    <span class="text-[9px] font-black uppercase tracking-widest">Day {{ idx + 1 }}</span>
                    <span class="text-xl font-black mt-1">{{ day.date }}</span>
                </button>
            </div>

            <!-- 行程清單 (包含分類、地圖、圖片、時間、備註) -->
            <div class="space-y-7">
                <div v-for="(item, i) in currentDayItems" :key="i" class="journal-card overflow-hidden active:scale-[0.98] transition-transform">
                    <div v-if="item.img" class="w-full h-48 bg-gray-100">
                        <img :src="item.img" class="w-full h-full object-cover">
                    </div>
                    <div class="p-8 text-left">
                        <div class="flex justify-between items-start mb-5">
                            <div class="flex gap-4 items-center text-left">
                                <div :class="['w-14 h-14 rounded-[22px] flex items-center justify-center shadow-inner', getCatColor(item.category)]">
                                    <i :data-lucide="getCatIcon(item.category)" class="w-7 h-7"></i>
                                </div>
                                <div class="text-left">
                                    <span class="text-[10px] font-black opacity-30 uppercase tracking-[0.
